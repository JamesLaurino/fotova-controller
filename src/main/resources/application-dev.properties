spring.application.name=fotova-creation-dev


####### MYSQL DATABASE CONNEXION ######
spring.datasource.url=jdbc:mysql://${SERVER_HOST}:3306/${DB_NAME}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=true
spring.liquibase.enabled=false
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.maximum-pool-size=10

####### JWT TOKEN ######
spring.jwt.secret=${JWT_TOKEN}
spring.jwt.expirationMs=${JWT_EXP}

##### FILE PATH AND VARIABLES
file.upload.path=${UPLOAD_FILE}
file.serve.path=${SERVE_PATH}
app.env.host=${SERVER_HOST}
app.env.protocol=${SERVER_PROTOCOL}
app.env.sender.email=${SENDER_EMAIL}

spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

##### MAIL-HOG SMTP EMAIL
spring.mail.host=${MAIL_HOG_HOST}
spring.mail.port=1025
spring.mail.username=${MAIL_HOG_USERNAME}
spring.mail.password=${MAIL_HOG_PASSWORD}
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
spring.mail.properties.mail.smtp.starttls.required=false

###### RABBIT MQ CONFIG ######
spring.rabbitmq.host=${RABBIT_HOST}
spring.rabbitmq.port=5672
spring.rabbitmq.username=${RABBIT_USERNAME}
spring.rabbitmq.password=${RABBIT_PASSWORD}


#### OPENAI ####
spring.ai.openai.api-key=${OPENAI_API_KEY}
spring.ai.openai.base-url=https://openrouter.ai/api
spring.ai.openai.chat.completions-path=/v1/chat/completions
spring.ai.openai.chat.options.model=deepseek/deepseek-v4-flash
logging.level.org.springframework.ai.chat.client.advisor=DEBUG

### PROMETHEUS ###
management.endpoints.web.exposure.include = prometheus, health, info
management.endpoint.prometheus.enabled=true

logging.file.name=${LOGGING_PATH_FILE}
logging.level.root=INFO
logging.level.web=INFO
logging.level.sql=INFO

###### STRIPE KEYS ######
stripe.secretKey=${STRIPE_KEY}
